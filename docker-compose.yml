version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adaptlearn-backend
    environment:
      - DATABASE_URL=sqlite:///./adaptlearn.db
      - SECRET_KEY=change-this-in-production
      - CORS_ORIGINS=http://localhost:3000
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: adaptlearn-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:

networks:
  default:
    name: adaptlearn_network
