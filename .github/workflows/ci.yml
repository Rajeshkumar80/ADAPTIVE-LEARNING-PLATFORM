name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: adaptive_learning
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/adaptive_learning
      JWT_SECRET: ci-test-secret-do-not-use-in-production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install backend dependencies
        working-directory: backend-ts
        run: npm ci
        
      - name: Generate Prisma client
        working-directory: backend-ts
        run: npx prisma generate
        
      - name: Push Prisma schema to DB
        working-directory: backend-ts
        run: npx prisma db push --skip-generate
        
      - name: Run backend tests
        working-directory: backend-ts
        run: |
          set +e
          npx jest --passWithNoTests --forceExit --verbose 2>&1 | tee /tmp/test-output.txt
          EXIT=${PIPESTATUS[0]}
          echo "### Test Output (exit code: $EXIT)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/test-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $EXIT
        
      - name: Build backend
        working-directory: backend-ts
        run: npm run build
